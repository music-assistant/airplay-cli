name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64
            cc: gcc
            cxx: g++
            packages: ""
          - platform: aarch64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cross toolchain
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - name: Build
        run: make STATIC=1 CC=${{ matrix.cc }} CXX=${{ matrix.cxx }}
      - name: Validate
        run: |
          bin="bin/cliairplay-linux-${{ matrix.platform }}"
          test -f "$bin"
          if [ "${{ matrix.platform }}" = "x86_64" ]; then
            make test STATIC=1 CC=${{ matrix.cc }} CXX=${{ matrix.cxx }}
            # Native: run the self-check (should print "cliairplay check").
            "./$bin" --check | grep -qE "cliairplay.*check"
          else
            # Cross-built: can't execute here, just confirm the architecture.
            file "$bin" | grep -qi "aarch64"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cliairplay-linux-${{ matrix.platform }}
          path: bin/cliairplay-linux-${{ matrix.platform }}
          if-no-files-found: error

  build-macos:
    # Both arches build on the arm64 runner: arm64 natively, x86_64 cross-compiled
    # via -arch (the Intel macos-13 runner is being retired).
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        platform: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          if [ "${{ matrix.platform }}" = "x86_64" ]; then
            make STATIC=1 CC=clang CXX=clang++ HOST=macos PLATFORM=x86_64 \
              EXTRA_CFLAGS="-arch x86_64" EXTRA_LDFLAGS="-arch x86_64"
          else
            make STATIC=1 CC=clang CXX=clang++
          fi
      - name: Validate
        run: |
          bin="bin/cliairplay-macos-${{ matrix.platform }}"
          test -f "$bin"
          if [ "${{ matrix.platform }}" = "arm64" ]; then
            make test STATIC=1 CC=clang CXX=clang++
            "./$bin" --check | grep -qE "cliairplay.*check"
          else
            file "$bin" | grep -qi "x86_64"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cliairplay-macos-${{ matrix.platform }}
          path: bin/cliairplay-macos-${{ matrix.platform }}
          if-no-files-found: error

  release:
    # Publish binaries as release assets when a version tag is pushed.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect binaries and checksums
        run: |
          mkdir release
          find artifacts -type f -name 'cliairplay-*' -exec cp {} release/ \;
          chmod +x release/cliairplay-*
          (cd release && sha256sum cliairplay-* > SHA256SUMS)
          ls -la release
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}" release/*
          --repo "${{ github.repository }}"
          --title "${{ github.ref_name }}"
          --generate-notes
